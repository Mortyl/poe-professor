  flask_effect_+%:                                            { base: 0.1, offense: 0.3, defense: 0.2, boss: 0.5, map: 0.4 }
  flask_duration_+%:                                          { base: 0.1, offense: 0.1, defense: 0.2, boss: 0.3, map: 0.3 }

